name: dhruva
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 0.2.3+3

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  # Loop 6 (voice). Pure-Dart tar.bz2 extraction for sherpa's model bundles
  # (ASR/TTS ship as .tar.bz2 archives of encoder/decoder/tokens files). MIT.
  archive: ^4.0.7
  # Loop 6 (voice). Plays a synthesized WAV file through the OS audio stack.
  # MIT. Lighter surface than just_audio for "play this file"; used only in
  # the coverage-excluded VoicePlayer adapter.
  audioplayers: ^6.5.1
  # Loop 3 foundation (T2-T4, see orchestra/BLACKBOARD.md).
  background_downloader: ^9.5.6
  crypto: ^3.0.6 # sha256 integrity check against HF's lfs.oid. Already a
  # transitive dep (build_runner) — declared directly since download_core
  # uses it in production code, not just tooling.
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  device_info_plus: ^13.2.0 # RAM (physicalRamSize/availableRamSize) + disk
  # (freeDiskSize/totalDiskSize) on Android + iOS — verified in package source,
  # no custom MethodChannel needed.
  # HF metadata API client transport (hf_api/hf_api_client.dart). Replaced
  # package:http — dio gives us typed DioException mapping, per-request
  # connect/receive timeouts, and a light retry on flaky mobile networks
  # (a real connection-abort was hit on-device). Model file DOWNLOADS still
  # go through background_downloader, NOT dio.
  dio: ^5.10.0
  drift: ^2.34.2
  drift_flutter: ^0.3.1 # bundles sqlite3_flutter_libs; native lib loading for drift.
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  # Loop 4 (chat): markdown rendering for assistant/user bubbles.
  # `flutter_markdown_plus` (BSD-3, actively maintained continuation of
  # Google's original flutter_markdown by Foresight Mobile — the original
  # package is discontinued) chosen over `gpt_markdown`/`markdown_widget`:
  # its `MarkdownStyleSheet` maps 1:1 onto chat-spec.md §2.2's per-element
  # TextTheme table (p/h1-h3/code/blockquote/listBullet/a — exactly the
  # named-role mapping the spec requires, no ad-hoc TextStyle literals) and
  # its `builders` map (`MarkdownElementBuilder`) lets the `code` element be
  # swapped for the spec's own block (language label + copy button, §2.3)
  # instead of fighting a bespoke AI-chat-flavored renderer's opinions.
  flutter_markdown_plus: ^1.0.12
  flutter_riverpod: ^3.3.2
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  # Loop 7 (vision): gallery + camera capture for the chat attach button.
  # First-party (flutter/packages federated plugin), BSD-3 — same license
  # family as share_plus/path_provider/url_launcher already in this file.
  # `features/vision/image_attach_source.dart` is the only file that imports
  # it (ADR-002: `features/chat` depends on the `ImageAttacher` interface,
  # same discipline as `voice/mic_audio_source.dart`'s `MicSource`).
  image_picker: ^1.2.3
  json_annotation: ^4.9.0
  # Inference engine (ADR-001). PINNED to an exact commit — the pub.dev
  # release (0.2.2) is stale and must NOT be used. See orchestra/DECISIONS.md
  # (ENGINE PIN). Native binaries are shipped/built separately, not by pub.
  llama_cpp_dart:
    git:
      url: https://github.com/netdur/llama_cpp_dart
      ref: c6e37785835a189261fab28e53386e4e954f3e42
  # `flutter_markdown_plus`'s own direct dependency, already resolved
  # transitively — declared directly because `MessageBubble`'s code-block
  # builder (chat-spec.md §2.3) touches `markdown`'s `Element`/`Text` AST
  # types itself (`sort_pub_dependencies`/`depend_on_referenced_packages`).
  markdown: ^7.3.1
  path: ^1.9.1 # already transitive; used directly for models-dir joins.
  path_provider: ^2.1.6
  # Loop 6 (voice). Mic capture as a 16kHz mono PCM stream (record.startStream)
  # for STT + the VAD segmenter. BSD-3-Clause, actively maintained (llfbandit).
  # T1 uses it only in the thin, coverage-excluded MicAudioSource adapter —
  # the VoiceService abstraction stays platform-free (audio streams in/out).
  record: ^6.1.2
  # Loop 4 (chat export, chat-spec.md §9): the OS share sheet. First-party
  # (flutter/packages federated plugin), BSD-3, macOS/iOS/Android supported —
  # the lightest correct way to hand a formatted string to "Share as .md/.json".
  share_plus: ^13.2.1
  # Loop 6 (voice, ADR-001-style abstraction). STT + TTS + Silero VAD in ONE
  # Apache-2.0 package with prebuilt native libs for Android/iOS/macOS/Windows/
  # Linux (macOS arm64 included → real round-trip verifiable on this dev
  # machine). Pinned to the orchestrator-verified 1.13.4. All FFI stays behind
  # engine_bindings/voice/ — features depend only on the VoiceService surface.
  sherpa_onnx: 1.13.4
  # Loop 4 (settings, Amendment 4b/2b): the credit row's outbound link and
  # the About section's GitHub link. First-party (flutter/packages
  # federated plugin), BSD-3 — same license family as share_plus/
  # path_provider/device_info_plus already in this file.
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.14.1 # pinned below 2.15 — newer requires meta ^1.18.3, which
  # conflicts with meta 1.17.0 pinned by flutter_test from the Flutter SDK.
  drift_dev: 2.34.0 # exact-pinned: 2.34.1+ requires analyzer ^13, which
  # conflicts with freezed 3.2.5's analyzer <11 constraint.
  fake_async: ^1.3.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  # Test-only: the hf_api tests build fake responses with http.Response and a
  # tiny custom dio HttpClientAdapter (test/support/mock_hf_client.dart) feeds
  # them to the migrated dio-based HfApiClient. Production code uses dio only.
  http: ^1.6.0
  json_serializable: ^6.14.0
  path_provider_platform_interface: ^2.1.3
  plugin_platform_interface: ^2.1.8
  url_launcher_platform_interface: ^2.3.2 # settings_screen_test's fake platform


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # Loop 5 (characters): the built-in starter pack `CharacterRepository.
  # seedBuiltInsIfPresent` seeds on first access — see data/characters/
  # character_seed.dart for the JSON schema. Deliberately tolerated as
  # absent by that loader (returns null, no-op) if this entry or the file
  # itself is ever missing.
  assets:
    - assets/characters/starter_pack.json

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

  # Loop 4 (design-tokens.json typography): BUNDLED assets, not google_fonts
  # — runtime font fetching is a Rule-5 violation. Sources + licenses in
  # assets/fonts/README.md. Each family is one variable font file (OFL);
  # Flutter resolves the requested `weight:` against the file's own wght
  # axis, so declaring the same file at two weights is correct, not a bug.
  fonts:
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Variable.ttf
          weight: 500
        - asset: assets/fonts/Fraunces-Variable.ttf
          weight: 600
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Variable.ttf
          weight: 600
    - family: Noto Sans Devanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Variable.ttf
          weight: 400
        - asset: assets/fonts/NotoSansDevanagari-Variable.ttf
          weight: 600
    - family: Noto Serif Devanagari
      fonts:
        - asset: assets/fonts/NotoSerifDevanagari-Variable.ttf
          weight: 500
        - asset: assets/fonts/NotoSerifDevanagari-Variable.ttf
          weight: 600
