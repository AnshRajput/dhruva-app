name: CI

on:
  pull_request:
    paths-ignore:
      - 'orchestra/**'
      - 'docs/**'
      - '*.md'
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib test
      - run: flutter analyze --fatal-infos
      - run: flutter test --coverage
      - name: Enforce coverage floor (70%)
        run: |
          if [ ! -f coverage/lcov.info ]; then echo "no coverage data"; exit 1; fi
          # Exclusions (see orchestra/DECISIONS.md "COVERAGE FLOOR SCOPE"):
          # - llama_engine_service.dart: native engine glue — its tests need real
          #   dylibs + a model, which CI lacks; unit-tested separately on dev machines
          # (features/debug_chat's exclusion was deleted with the harness itself
          # in Loop 4 — see orchestra/BLACKBOARD.md.)
          total=$(python3 - << 'PY'
          import re
          recs = open('coverage/lcov.info').read().split('end_of_record')
          excl = ('lib/engine_bindings/llama_engine_service.dart',)
          lf = lh = 0
          for r in recs:
              m = re.search(r'SF:(.+)', r)
              if not m or any(e in m.group(1) for e in excl): continue
              lf += sum(int(x) for x in re.findall(r'^LF:(\d+)', r, re.M))
              lh += sum(int(x) for x in re.findall(r'^LH:(\d+)', r, re.M))
          print(round(100*lh/lf) if lf else 0)
          PY
          )
          echo "coverage (floor scope): ${total}%"
          if [ "$total" -lt 70 ]; then echo "coverage ${total}% below 70% floor"; exit 1; fi

  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --no-codesign
